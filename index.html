<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a56db">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="업무일지">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<title>업무일지</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --accent:#1a56db;--accent-dark:#1344b8;--accent-light:#e8f0fe;
  --bg:#f8f9fa;--surface:#fff;--surface2:#f1f3f5;
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --border:#e0e0e0;--border2:#ccc;
  --danger:#e53e3e;--danger-bg:#fff5f5;
  --radius:10px;--shadow:0 1px 4px rgba(0,0,0,.1);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

/* ── Header ── */
.header{position:sticky;top:0;z-index:50;background:var(--accent);color:#fff;padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:16px;font-weight:600}
.header-btns{display:flex;gap:6px}
.icon-btn{background:rgba(255,255,255,.2);border:none;color:#fff;width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.icon-btn:active{background:rgba(255,255,255,.35)}

/* ── Calendar ── */
.cal-wrap{background:var(--accent);padding:0 12px 14px;user-select:none}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:6px 4px 10px;color:#fff}
.cal-nav button{background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.cal-nav button:active{background:rgba(255,255,255,.35)}
.cal-nav span{font-size:15px;font-weight:600;color:#fff}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{text-align:center;font-size:10px;font-weight:600;color:rgba(255,255,255,.65);padding-bottom:4px}
.cal-dow:first-child{color:#fca5a5}
.cal-dow:last-child{color:#93c5fd}
.cal-cell{position:relative;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:4px;border-radius:8px;cursor:pointer;transition:background .12s}
.cal-cell:hover{background:rgba(255,255,255,.15)}
.cal-cell.today .cal-num{background:#fff;color:var(--accent);font-weight:700;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.cal-cell.selected{background:rgba(255,255,255,.25)}
.cal-cell.other-month .cal-num{opacity:.35}
.cal-num{font-size:12px;color:#fff;line-height:1;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.cal-cell.sun .cal-num{color:#fca5a5}
.cal-cell.sat .cal-num{color:#93c5fd}
.cal-dots{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap;justify-content:center;max-width:28px}
.cal-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.7);flex-shrink:0}

/* ── Day preview tooltip ── */
.day-preview{background:var(--surface);border-radius:12px;margin:0 12px;box-shadow:0 4px 20px rgba(0,0,0,.15);overflow:hidden;transform:scaleY(0);transform-origin:top;transition:transform .2s cubic-bezier(.4,0,.2,1),opacity .2s;opacity:0;max-height:0}
.day-preview.open{transform:scaleY(1);opacity:1;max-height:300px}
.dp-header{padding:10px 14px 6px;display:flex;align-items:center;justify-content:space-between}
.dp-date{font-size:13px;font-weight:600;color:var(--accent)}
.dp-count{font-size:11px;color:var(--text3)}
.dp-list{padding:0 14px 10px;display:flex;flex-direction:column;gap:5px;max-height:180px;overflow-y:auto}
.dp-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg);border-radius:8px;cursor:pointer;transition:background .12s}
.dp-item:active{background:var(--accent-light)}
.dp-vendor{font-size:11px;font-weight:600;color:var(--accent);flex-shrink:0}
.dp-work{font-size:12px;color:var(--text);flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.dp-empty{padding:12px 14px;font-size:12px;color:var(--text3);text-align:center}
.dp-add{margin:0 14px 10px;padding:7px;background:var(--accent-light);color:var(--accent);border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;width:calc(100% - 28px);font-family:inherit}
.dp-add:active{background:#c7d9fd}

/* ── Tabs ── */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-weight:500}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── Filter bar ── */
.filter-bar{padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:8px}
.filter-bar input{flex:1;padding:7px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text);outline:none}
.filter-bar input:focus{border-color:var(--accent)}
.filter-bar select{padding:7px 8px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text);outline:none}

/* ── Stats ── */
.stats-bar{padding:7px 14px;display:flex;gap:10px;align-items:center;background:var(--surface);border-bottom:1px solid var(--border)}
.stat-chip{font-size:11px;color:var(--text3);background:var(--surface2);padding:3px 9px;border-radius:99px}
.stat-chip span{color:var(--accent);font-weight:600}

/* ── List ── */
.list{padding:10px 14px;display:flex;flex-direction:column;gap:10px;padding-bottom:80px}

/* ── Card ── */
.card{background:var(--surface);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--border)}
.card.highlight{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-light)}
.card-header{padding:11px 13px 7px;display:flex;align-items:flex-start;gap:8px}
.date-badge{background:var(--accent-light);color:var(--accent);font-size:11px;font-weight:600;padding:2px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.vendor{font-size:13px;font-weight:600;color:var(--text);flex:1}
.card-work{padding:0 13px 7px;font-size:13px;color:var(--text);line-height:1.6}
.card-note{padding:0 13px 9px}
.note-text{font-size:12px;color:var(--text2);background:var(--surface2);padding:5px 9px;border-radius:6px;line-height:1.5;border-left:3px solid var(--accent-light)}
.photo-strip{padding:0 13px 9px;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none}
.photo-strip::-webkit-scrollbar{display:none}
.photo-thumb{width:58px;height:58px;flex-shrink:0;border-radius:7px;object-fit:cover;border:1px solid var(--border);cursor:pointer}
.photo-thumb:active{opacity:.7}
.photo-more{width:58px;height:58px;flex-shrink:0;border-radius:7px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);cursor:pointer;font-weight:600}
.add-photo-btn{width:58px;height:58px;flex-shrink:0;border-radius:7px;border:2px dashed var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-direction:column;gap:2px;color:var(--text3)}
.add-photo-btn span{font-size:20px;line-height:1}
.add-photo-btn p{font-size:10px}
.add-photo-btn:active{background:var(--surface2)}
.card-actions{padding:7px 13px 11px;display:flex;gap:6px;border-top:1px solid var(--border)}
.card-btn{flex:1;padding:6px;border-radius:8px;border:1px solid var(--border);background:var(--surface);font-size:12px;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;font-family:inherit}
.card-btn:active{background:var(--surface2)}
.card-btn.del{color:var(--danger);border-color:#fecaca}
.card-btn.del:active{background:var(--danger-bg)}

/* ── FAB ── */
.fab{position:fixed;bottom:22px;right:18px;z-index:50;width:54px;height:54px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(26,86,219,.4);display:flex;align-items:center;justify-content:center;transition:transform .15s}
.fab:active{transform:scale(.93)}

/* ── Bottom Sheet ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100}
.overlay.open{display:block}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:101;background:var(--surface);border-radius:20px 20px 0 0;max-height:93vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:38px;height:4px;background:var(--border2);border-radius:2px;margin:11px auto 0}
.sheet-header{padding:14px 18px 11px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.sheet-header h2{font-size:15px;font-weight:600}
.sheet-close{background:var(--surface2);border:none;width:28px;height:28px;border-radius:50%;font-size:15px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center}
.sheet-body{padding:14px 18px 36px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.field input,.field textarea{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;color:var(--text);background:var(--bg);outline:none;font-family:inherit;transition:border-color .15s}
.field input:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:76px;line-height:1.6}
.upload-zone{border:2px dashed var(--border2);border-radius:10px;padding:18px;text-align:center;cursor:pointer;background:var(--bg);position:relative}
.upload-zone:active,.upload-zone.drag{background:var(--accent-light);border-color:var(--accent)}
.upload-zone input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer}
.upload-zone .uz-icon{font-size:28px;margin-bottom:5px}
.upload-zone p{font-size:13px;color:var(--text2)}
.upload-zone small{font-size:11px;color:var(--text3)}
.preview-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:10px}
.prev-item{position:relative;aspect-ratio:1}
.prev-item img{width:100%;height:100%;object-fit:cover;border-radius:7px;border:1px solid var(--border)}
.prev-del{position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:var(--danger);color:#fff;border:2px solid #fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.save-btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px}
.save-btn:active{background:var(--accent-dark)}

/* ── Lightbox ── */
.lightbox{display:none;position:fixed;inset:0;background:#000;z-index:200;flex-direction:column;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lb-img-wrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%;position:relative}
.lb-img-wrap img{max-width:100%;max-height:100%;object-fit:contain;user-select:none}
.lb-top{position:absolute;top:0;left:0;right:0;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(0,0,0,.6),transparent)}
.lb-top span{color:rgba(255,255,255,.8);font-size:13px}
.lb-close{background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lb-nav.prev{left:12px}.lb-nav.next{right:12px}
.lb-thumbs{padding:10px 16px 20px;display:flex;gap:6px;overflow-x:auto;width:100%;scrollbar-width:none}
.lb-thumbs::-webkit-scrollbar{display:none}
.lb-t{width:50px;height:50px;flex-shrink:0;object-fit:cover;border-radius:6px;cursor:pointer;border:2px solid transparent;opacity:.55;transition:all .15s}
.lb-t.active{border-color:#fff;opacity:1}

/* ── Misc ── */
.empty{text-align:center;padding:50px 20px;color:var(--text3)}
.empty .ei{font-size:44px;margin-bottom:10px}
.toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:#fff;padding:9px 18px;border-radius:99px;font-size:13px;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:300}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.install-banner{background:var(--accent-light);border-bottom:1px solid #c3d4f8;padding:9px 14px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--accent)}
.install-banner button{margin-left:auto;background:var(--accent);color:#fff;border:none;padding:5px 12px;border-radius:7px;font-size:12px;cursor:pointer;font-weight:600}
.install-banner .close-banner{background:none;padding:3px;font-size:15px;color:inherit}
/* ── Alarm badge ── */
.alarm-badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0;background:#fff3cd;color:#856404;border:1px solid #ffc107}
.alarm-badge.today{background:#ffe0e0;color:#c0392b;border-color:#e74c3c;animation:pulse 1.5s infinite}
.alarm-badge.past{background:var(--surface2);color:var(--text3);border-color:var(--border);text-decoration:line-through}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.drive-bar{padding:8px 14px;display:flex;align-items:center;gap:10px;font-size:12px;border-bottom:1px solid var(--border)}
.drive-bar.connected{background:#f0fff4;color:#276749}
.drive-bar.disconnected{background:#fff8e1;color:#92400e}
.drive-bar.syncing{background:var(--accent-light);color:var(--accent)}
.drive-bar-icon{font-size:16px}
.drive-bar-btn{margin-left:auto;padding:4px 12px;border-radius:6px;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.drive-bar.connected .drive-bar-btn{background:#276749;color:#fff}
.drive-bar.disconnected .drive-bar-btn{background:#d97706;color:#fff}
</style>
</head>
<body>

<div id="driveBar" style="display:none" class="drive-bar disconnected">
  <span class="drive-bar-icon">☁️</span>
  <span id="driveBarMsg">구글 드라이브 미연결</span>
  <button class="drive-bar-btn" id="driveBarBtn" onclick="driveToggle()">연결</button>
</div>
<div id="installBanner" style="display:none" class="install-banner">
  <span>📱 홈 화면에 추가해서 앱처럼 사용하세요!</span>
  <button id="installBtn">설치</button>
  <button class="close-banner" onclick="document.getElementById('installBanner').style.display='none'">✕</button>
</div>

<header class="header">
  <h1>📋 업무 일지</h1>
  <div class="header-btns">
    <button class="icon-btn" id="driveBtn" onclick="driveToggle()" title="구글 드라이브 동기화">☁️</button>
    <button class="icon-btn" onclick="saveToFile()" title="파일 저장">💾</button>
    <button class="icon-btn" onclick="document.getElementById('loadFileInput').click()" title="불러오기">📂</button>
    <button class="icon-btn" onclick="exportCSV()" title="엑셀 내보내기">⬇</button>
  </div>
</header>
<input type="file" id="loadFileInput" accept=".worklog,.json" style="display:none" onchange="loadFromFile(event)">

<!-- ── Calendar ── -->
<div class="cal-wrap">
  <div class="cal-nav">
    <button onclick="calMove(-1)">‹</button>
    <span id="calTitle"></span>
    <button onclick="calMove(1)">›</button>
  </div>
  <div class="cal-grid" id="calDow">
    <div class="cal-dow">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div>
    <div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div>
    <div class="cal-dow">토</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<!-- Day preview -->
<div class="day-preview" id="dayPreview">
  <div class="dp-header">
    <span class="dp-date" id="dpDate"></span>
    <span class="dp-count" id="dpCount"></span>
  </div>
  <div class="dp-list" id="dpList"></div>
  <button class="dp-add" id="dpAdd" onclick="addFromDay()">＋ 이 날 항목 추가</button>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" id="tabAll" onclick="switchTab('all')">전체 목록</div>
  <div class="tab" id="tabSelected" onclick="switchTab('selected')">선택한 날</div>
</div>

<!-- Filter (전체 탭용) -->
<div class="filter-bar" id="filterBar">
  <input type="text" id="search" placeholder="🔍 거래처, 작업내용 검색" oninput="render()">
  <select id="monthFilter" onchange="render()">
    <option value="">전체</option>
    <option value="1">1월</option><option value="2">2월</option><option value="3">3월</option>
    <option value="4">4월</option><option value="5">5월</option><option value="6">6월</option>
    <option value="7">7월</option><option value="8">8월</option><option value="9">9월</option>
    <option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
  </select>
</div>

<div class="stats-bar">
  <div class="stat-chip">총 <span id="totalCount">0</span>건</div>
  <div class="stat-chip">사진 <span id="totalPhotos">0</span>장</div>
  <div class="stat-chip" id="lastSaved" style="margin-left:auto"></div>
</div>

<div class="list" id="list"></div>
<button class="fab" onclick="openSheet()">＋</button>

<!-- Overlay + Sheet -->
<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <h2 id="sheetTitle">새 항목 추가</h2>
    <button class="sheet-close" onclick="closeSheet()">✕</button>
  </div>
  <div class="sheet-body">
    <div class="field"><label>날짜</label><input type="date" id="fDate"></div>
    <div class="field"><label>거래처</label><input type="text" id="fVendor" placeholder="예: 신아정공"></div>
    <div class="field"><label>작업내용</label><textarea id="fWork" placeholder="작업 내용을 입력하세요" rows="3"></textarea></div>
    <div class="field"><label>비고</label><textarea id="fNote" placeholder="비고 사항 (선택)" rows="2"></textarea></div>
    <div class="field">
      <label>사진 첨부</label>
      <div class="upload-zone" id="uploadZone">
        <input type="file" accept="image/*" multiple id="fileInput" onchange="handleFiles(event)" style="display:none">
        <div class="uz-icon">📷</div>
        <p>탭해서 사진 선택</p>
        <small>여러 장 동시 선택 가능</small>
      </div>
      <div class="preview-grid" id="previewGrid"></div>
    </div>
    <div class="field">
      <label>🔔 알림 날짜 <span style="font-weight:400;color:var(--text3)">(선택)</span></label>
      <input type="date" id="fAlarm" placeholder="알림받을 날짜">
      <div style="font-size:11px;color:var(--text3);margin-top:4px">납품예정일 등 중요한 날짜를 설정하면 당일 알림을 받습니다</div>
    </div>
    <button class="save-btn" onclick="saveEntry()">저장하기</button>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <div class="lb-img-wrap">
    <div class="lb-top">
      <span id="lbCaption"></span>
      <button class="lb-close" onclick="closeLightbox()">✕</button>
    </div>
    <img id="lbImg" src="" alt="사진">
    <button class="lb-nav prev" onclick="lbNav(-1)">‹</button>
    <button class="lb-nav next" onclick="lbNav(1)">›</button>
  </div>
  <div class="lb-thumbs" id="lbThumbs"></div>
</div>

<div class="toast" id="toast"></div>
<input type="file" accept="image/*" multiple id="quickFileInput" style="display:none" onchange="handleQuickFiles(event)">

<script>
const STORE = 'worklog_pwa_v2';
let entries = [];

// ── Calendar ──────────────────────────────────────
function calMove(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCal();
  hideDayPreview();
}

function renderCal() {
  document.getElementById('calTitle').textContent = `${calYear}년 ${calMonth+1}월`;
  const grid = document.getElementById('calGrid');
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const lastDate = new Date(calYear, calMonth+1, 0).getDate();
  const prevLast = new Date(calYear, calMonth, 0).getDate();

  // Build date index for quick lookup
  const dateMap = {};
  entries.forEach(e => {
    if (e.date) { dateMap[e.date] = (dateMap[e.date]||0)+1; }
  });

  const todayStr = fmtDate(today);
  let cells = '';
  let total = firstDay + lastDate;
  let rows = Math.ceil(total/7)*7;

  for (let i=0; i<rows; i++) {
    let d, mo = calMonth, yr = calYear, cls = '';
    if (i < firstDay) {
      d = prevLast - firstDay + 1 + i; mo = calMonth-1; if(mo<0){mo=11;yr--;}
      cls = 'other-month';
    } else if (i >= firstDay+lastDate) {
      d = i - firstDay - lastDate + 1; mo = calMonth+1; if(mo>11){mo=0;yr++;}
      cls = 'other-month';
    } else {
      d = i - firstDay + 1;
    }
    const dow = i % 7;
    if (dow===0) cls += ' sun'; if (dow===6) cls += ' sat';
    const dateStr = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if (dateStr === todayStr) cls += ' today';
    if (dateStr === selectedDate) cls += ' selected';
    const cnt = dateMap[dateStr] || 0;
    const dots = cnt > 0 ? `<div class="cal-dots">${Array(Math.min(cnt,4)).fill('<div class="cal-dot"></div>').join('')}</div>` : '';
    cells += `<div class="cal-cell ${cls}" data-date="${dateStr}" onclick="selectDate('${dateStr}')">`
           + `<div class="cal-num">${d}</div>${dots}</div>`;
  }
  grid.innerHTML = cells;
}

function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function selectDate(dateStr) {
  if (selectedDate === dateStr) {
    // 같은 날 다시 탭 → 닫기
    selectedDate = null;
    hideDayPreview();
    if (currentTab === 'selected') switchTab('all');
    renderCal();
    return;
  }
  selectedDate = dateStr;
  renderCal();
  showDayPreview(dateStr);
  if (currentTab === 'selected') render();
}

function showDayPreview(dateStr) {
  const [yr, mo, d] = dateStr.split('-');
  document.getElementById('dpDate').textContent = `${parseInt(mo)}월 ${parseInt(d)}일`;
  const dayEntries = entries.filter(e => e.date === dateStr);
  document.getElementById('dpCount').textContent = dayEntries.length ? `${dayEntries.length}건` : '';

  const list = document.getElementById('dpList');
  if (!dayEntries.length) {
    list.innerHTML = '<div class="dp-empty">이 날 등록된 업무가 없습니다</div>';
  } else {
    list.innerHTML = dayEntries.map(e =>
      `<div class="dp-item" onclick="scrollToCard(${e.id}); switchTab('all')">
        <span class="dp-vendor">${esc(e.vendor)}</span>
        <span class="dp-work">${esc(e.work)}</span>
      </div>`
    ).join('');
  }
  document.getElementById('dayPreview').classList.add('open');
}

function hideDayPreview() {

}

// ── Render ────────────────────────────────────────
function render() {
  let filtered;
  if (currentTab === 'selected' && selectedDate) {
    filtered = entries.filter(e => e.date === selectedDate);
  } else {
    const q = document.getElementById('search').value.toLowerCase();
    const m = document.getElementById('monthFilter').value;
    filtered = entries.filter(e => {
      const mQ = !q || e.vendor.toLowerCase().includes(q) || e.work.toLowerCase().includes(q) || (e.note||'').toLowerCase().includes(q);
      const mM = !m || (e.date && parseInt(e.date.split('-')[1]) === parseInt(m));
      return mQ && mM;
    });
  }
  filtered.sort((a,b) => a.date < b.date ? 1 : -1);

  const totalPhotos = entries.reduce((s,e)=>s+(e.imgs||[]).length,0);
  document.getElementById('totalCount').textContent = filtered.length;
  document.getElementById('totalPhotos').textContent = totalPhotos;

  const list = document.getElementById('list');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><div class="ei">${currentTab==='selected'?'📅':'📭'}</div><p>${currentTab==='selected' && selectedDate ? '이 날 등록된 업무가 없습니다<br><br>' : '항목이 없습니다<br>'}</p></div>`;
    if (currentTab==='selected' && selectedDate) {
      list.innerHTML += `<div style="text-align:center"><button onclick="addFromDay()" style="background:var(--accent);color:#fff;border:none;padding:10px 24px;border-radius:10px;font-size:14px;cursor:pointer;font-family:inherit">＋ 이 날 항목 추가</button></div>`;
    }
    return;
  }
  list.innerHTML = filtered.map(e => {
    const dp = e.date ? e.date.replace(/^\d{4}-/,'').replace('-','월 ')+'일' : '';
    const imgs = e.imgs || [];
    const photoHtml = `<div class="photo-strip">
      ${imgs.slice(0,5).map((img,i)=>`<img class="photo-thumb" src="${img}" alt="사진" onclick="openLightbox(${e.id},${i})" loading="lazy">`).join('')}
      ${imgs.length>5?`<div class="photo-more" onclick="openLightbox(${e.id},0)">+${imgs.length-5}</div>`:''}
      <button class="add-photo-btn" onclick="quickPhoto(${e.id})"><span>📷</span><p>추가</p></button>
    </div>`;
    return `<div class="card" id="card-${e.id}">
      <div class="card-header">
        <div class="date-badge">${dp}</div>
        <div class="vendor">${esc(e.vendor)}</div>
        ${e.alarm ? `<div class="alarm-badge ${e.alarm === fmtDate(today) ? 'today' : e.alarm < fmtDate(today) ? 'past' : ''}">🔔 ${e.alarm.replace(/^\d{4}-/,'').replace('-','/')}</div>` : ''}
      </div>
      <div class="card-work">${esc(e.work)}</div>
      ${e.note?`<div class="card-note"><div class="note-text">${esc(e.note)}</div></div>`:''}
      ${photoHtml}
      <div class="card-actions">
        <button class="card-btn" onclick="editEntry(${e.id})">✏️ 수정</button>
        <button class="card-btn del" onclick="deleteEntry(${e.id})">🗑 삭제</button>
      </div>
    </div>`;
  }).join('');
}

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

// ── 이미지 압축 ───────────────────────────────────
function compressImage(file, maxWidth=1280, quality=0.75) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── File handling ─────────────────────────────────
function handleFiles(ev) {
  const files = Array.from(ev.target.files);
  showToast(`📷 사진 ${files.length}장 압축 중...`);
  Promise.all(files.map(f => compressImage(f))).then(compressed => {
    pendingImgs.push(...compressed);
    renderPreview();
    showToast(`✅ ${files.length}장 추가됨`);
  });
  ev.target.value='';
}
const uz=document.getElementById('uploadZone');
uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('drag');});
uz.addEventListener('dragleave',()=>uz.classList.remove('drag'));
uz.addEventListener('drop',e=>{
  e.preventDefault();uz.classList.remove('drag');

});

function saveEntry(){
  const date=document.getElementById('fDate').value;
  const vendor=document.getElementById('fVendor').value.trim();
  const work=document.getElementById('fWork').value.trim();
  const note=document.getElementById('fNote').value.trim();
  const alarm=document.getElementById('fAlarm').value;
  if(!date||!work){showToast('날짜와 작업내용은 필수입니다');return;}
  if(editId){
    const i=entries.findIndex(x=>x.id===editId);
    entries[i]={id:editId,date,vendor,work,note,alarm,imgs:pendingImgs};
    showToast('수정되었습니다');
  } else {
    const newId=entries.length?Math.max(...entries.map(x=>x.id))+1:1;
    entries.push({id:newId,date,vendor,work,note,alarm,imgs:pendingImgs});
    showToast('저장되었습니다');
  }
  saveData(); closeSheet(); renderCal(); render();
  if(selectedDate===date) showDayPreview(date);
}
function editEntry(id){openSheet(id);}
function deleteEntry(id){
  if(!confirm('이 항목을 삭제할까요?'))return;
  entries=entries.filter(x=>x.id!==id);
  saveData(); renderCal(); render(); showToast('삭제되었습니다');
  if(selectedDate) showDayPreview(selectedDate);
}

// ── Lightbox ──────────────────────────────────────
function openLightbox(entryId,idx){
  const e=entries.find(x=>x.id===entryId);
  if(!e||!e.imgs||!e.imgs.length)return;
  lbImgs=e.imgs;lbIdx=idx;updateLb();
  document.getElementById('lightbox').classList.add('open');
}
function updateLb(){
  document.getElementById('lbImg').src=lbImgs[lbIdx];
  document.getElementById('lbCaption').textContent=`${lbIdx+1} / ${lbImgs.length}`;
  document.getElementById('lbThumbs').innerHTML=lbImgs.map((img,i)=>
    `<img class="lb-t ${i===lbIdx?'active':''}" src="${img}" onclick="lbGoTo(${i})">`).join('');
}
function lbNav(d){lbIdx=(lbIdx+d+lbImgs.length)%lbImgs.length;updateLb();}
function lbGoTo(i){lbIdx=i;updateLb();}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}
let lbTouchX=null;
document.getElementById('lightbox').addEventListener('touchstart',e=>{lbTouchX=e.touches[0].clientX;});
document.getElementById('lightbox').addEventListener('touchend',e=>{
  if(lbTouchX===null)return;
  const dx=e.changedTouches[0].clientX-lbTouchX;
  if(Math.abs(dx)>40)lbNav(dx<0?1:-1);
  lbTouchX=null;
});
document.addEventListener('keydown',e=>{
  if(!document.getElementById('lightbox').classList.contains('open'))return;
  if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);if(e.key==='Escape')closeLightbox();
});

// ── File save/load ────────────────────────────────
function saveToFile(){
  const data=JSON.stringify({version:1,savedAt:new Date().toISOString(),entries},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='업무일지_'+fmtDate(new Date())+'.worklog';a.click();
  URL.revokeObjectURL(url);showToast('💾 파일로 저장되었습니다');
}
function loadFromFile(ev){
  const file=ev.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      const loaded=data.entries||data;
      if(!Array.isArray(loaded))throw new Error();
      if(!confirm(`저장된 항목 ${loaded.length}건을 불러올까요?\n현재 데이터는 덮어씌워집니다.`))return;
      entries=loaded;saveData();renderCal();render();showToast(`📂 ${loaded.length}건 불러왔습니다`);
    }catch{alert('올바른 .worklog 파일이 아닙니다.');}
  };
  reader.readAsText(file);ev.target.value='';
}

// ── CSV export ────────────────────────────────────
function exportCSV(){
  const rows=[['날짜','거래처','작업내용','비고','사진수']];
  entries.forEach(e=>rows.push([e.date,e.vendor,e.work,e.note||'',(e.imgs||[]).length]));
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='업무일지_'+fmtDate(new Date())+'.csv';a.click();
  URL.revokeObjectURL(url);showToast('CSV로 내보냈습니다');
}

const GDRIVE_CLIENT_ID = '19569976343-rtqi91q0hav5tivork6fd6jsvp8fbf6f.apps.googleusercontent.com';
const GDRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';
const GDRIVE_FILENAME = '업무일지_데이터.worklog';
let driveToken = null;
let driveFileId = localStorage.getItem('worklog_drive_fileid') || null;
let driveConnected = false;

function driveToggle(){
  if(driveConnected){ driveDisconnect(); }
  else { driveLogin(); }
}

function driveLogin(){
  setDriveBar('syncing','구글 로그인 중...');
  const client = google.accounts.oauth2.initTokenClient({
    client_id: GDRIVE_CLIENT_ID,
    scope: GDRIVE_SCOPE,
    callback: async (resp) => {
      if(resp.error){ setDriveBar('disconnected','로그인 실패'); showToast('구글 로그인 실패'); return; }
      driveToken = resp.access_token;
      driveConnected = true;
      setDriveBar('connected','구글 드라이브 연결됨');
      showToast('☁️ 구글 드라이브 연결됨');
      await driveSyncDown(); // 먼저 클라우드 데이터 확인
    }
  });
  client.requestAccessToken();
}

function driveDisconnect(){
  if(!confirm('구글 드라이브 연결을 해제할까요?')) return;
  if(driveToken) google.accounts.oauth2.revoke(driveToken);
  driveToken = null; driveConnected = false;
  setDriveBar('disconnected','구글 드라이브 미연결');
  document.getElementById('driveBtn').textContent = '☁️';
  showToast('드라이브 연결 해제됨');
}

function setDriveBar(state, msg){
  const bar = document.getElementById('driveBar');
  const msgEl = document.getElementById('driveBarMsg');
  const btn = document.getElementById('driveBarBtn');
  bar.style.display = 'flex';
  bar.className = 'drive-bar ' + state;
  msgEl.textContent = msg;
  if(state==='connected'){ btn.textContent='동기화'; btn.onclick=driveSyncUp; }
  else if(state==='disconnected'){ btn.textContent='연결'; btn.onclick=driveToggle; }
  else { btn.textContent='...'; btn.onclick=null; }
  document.getElementById('driveBtn').textContent = state==='connected' ? '🟢' : state==='syncing' ? '🔄' : '☁️';
}

// 드라이브에 저장 (업로드)
async function driveSyncUp(){
  if(!driveToken){ showToast('먼저 드라이브를 연결해주세요'); return; }
  setDriveBar('syncing','저장 중...');
  const content = JSON.stringify({version:1, savedAt:new Date().toISOString(), entries});
  const blob = new Blob([content],{type:'application/json'});

  try{
    if(driveFileId){
      // 기존 파일 업데이트
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`,{
        method:'PATCH', headers:{'Authorization':'Bearer '+driveToken,'Content-Type':'application/json'}, body:blob
      });
    } else {
      // 새 파일 생성
      const meta = {name: GDRIVE_FILENAME, mimeType:'application/json'};
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify(meta)],{type:'application/json'}));
      form.append('file', blob);
      const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
        method:'POST', headers:{'Authorization':'Bearer '+driveToken}, body:form
      });
      const data = await res.json();
      driveFileId = data.id;
      localStorage.setItem('worklog_drive_fileid', driveFileId);
    }
    setDriveBar('connected','☁️ 저장됨 '+ new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}));
    showToast('☁️ 드라이브에 저장됨');
  } catch(e){
    setDriveBar('connected','저장 실패 - 다시 시도');
    showToast('드라이브 저장 실패');
  }
}

// 드라이브에서 불러오기 (다운로드)
async function driveSyncDown(){
  if(!driveToken) return;
  setDriveBar('syncing','드라이브에서 불러오는 중...');
  try{
    let fileId = driveFileId;
    if(!fileId){
      // 파일 검색
      const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${GDRIVE_FILENAME}'&spaces=drive`,{
        headers:{'Authorization':'Bearer '+driveToken}
      });
      const data = await res.json();
      if(data.files && data.files.length > 0){
        fileId = data.files[0].id;
        driveFileId = fileId;
        localStorage.setItem('worklog_drive_fileid', fileId);
      }
    }
    if(fileId){
      const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{
        headers:{'Authorization':'Bearer '+driveToken}
      });
      const data = await res.json();
      const loaded = data.entries || data;
      if(Array.isArray(loaded) && loaded.length > 0){
        if(loaded.length !== entries.length){
          if(confirm(`드라이브에 ${loaded.length}건의 데이터가 있습니다.\n불러올까요? (현재 데이터는 덮어씌워집니다)`)){
            entries = loaded; saveData(); renderCal(); render();
            showToast(`☁️ ${loaded.length}건 불러왔습니다`);
          }
        }
      }
      setDriveBar('connected','☁️ 연결됨 - ' + loaded.length + '건');
    } else {
      // 드라이브에 파일 없음 → 현재 데이터 업로드
      setDriveBar('connected','☁️ 연결됨 (새 파일 생성)');
      await driveSyncUp();
    }
  } catch(e){
    setDriveBar('connected','드라이브 불러오기 실패');
  }
}

// 저장할 때 드라이브 자동 업로드
function saveData(){
  saveDataLocal();
  if(driveConnected) driveSyncUp();
}

// ── Service Worker ────────────────────────────────
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}

// ── 알림 체크 ─────────────────────────────────────
function checkAlarms(){
  const todayStr = fmtDate(new Date());
  const todayAlarms = entries.filter(e => e.alarm === todayStr);
  if(!todayAlarms.length) return;

  // 브라우저 알림 권한 요청
  if('Notification' in window){
    Notification.requestPermission().then(perm => {
      if(perm === 'granted'){
        todayAlarms.forEach(e => {
          new Notification('📋 업무일지 알림', {
            body: `[${e.vendor}] ${e.work}`,
            icon: 'icons/icon-192.png'
          });
        });
      }
    });
  }

  // 앱 내 팝업도 표시
  const names = todayAlarms.map(e => `• [${e.vendor}] ${e.work}`).join('\n');
  setTimeout(() => {
    showAlarmPopup(todayAlarms);
  }, 800);
}

function showAlarmPopup(alarms){
  const existing = document.getElementById('alarmPopup');
  if(existing) existing.remove();

  const popup = document.createElement('div');
  popup.id = 'alarmPopup';
  popup.style.cssText = `position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px`;
  popup.innerHTML = `
    <div style="background:#fff;border-radius:16px;padding:24px;width:100%;max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,.2)">
      <div style="font-size:32px;text-align:center;margin-bottom:8px">🔔</div>
      <h3 style="font-size:16px;font-weight:700;text-align:center;margin-bottom:4px;color:#1a1a1a">오늘 알림 ${alarms.length}건</h3>
      <p style="font-size:12px;color:#999;text-align:center;margin-bottom:16px">${fmtDate(new Date()).replace(/-/g,'.')} 예정 업무</p>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px">
        ${alarms.map(e=>`
          <div style="background:#f8f9fa;border-radius:8px;padding:10px 12px;border-left:3px solid #1a56db">
            <div style="font-size:12px;font-weight:600;color:#1a56db">${esc(e.vendor)}</div>
            <div style="font-size:13px;color:#1a1a1a;margin-top:2px">${esc(e.work)}</div>
          </div>`).join('')}
      </div>
      <button onclick="document.getElementById('alarmPopup').remove()" style="width:100%;padding:12px;background:#1a56db;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">확인</button>
    </div>`;
  document.body.appendChild(popup);
}

// ── Start ─────────────────────────────────────────
loadData();
renderCal();
render();
checkAlarms();
</script>
